ipv6: false
port: 7890
socks-port: 7891
allow-lan: false
mode: Rule
log-level: info
external-controller: 127.0.0.1:9090
unified-delay: true
tcp-concurrent: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver: [223.5.5.5, 223.6.6.6, 119.29.29.29, 'https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  fallback: ['https://1.1.1.1/dns-query', 'https://8.8.8.8/dns-query', 'tls://1.1.1.1', 'tls://8.8.8.8']
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr: ['240.0.0.0/4', '0.0.0.0/8']

proxies:
  - { name: '🏠 家庭宽带美国', type: socks5, server: 100.95.126.121, port: 1080, interface-name: Tailscale }

proxy-groups:
  - { name: 漏网之鱼, type: select, proxies: ['🏠 家庭宽带美国', DIRECT] }

rules:
  # ── DeepSeek（国内服务，直连）────────────────────────────────────
  - DOMAIN-SUFFIX,deepseek.com,DIRECT

  # ── CDN / 配置更新通道（国内可达，必须直连）─────────────────────
  - DOMAIN-SUFFIX,jsdelivr.net,DIRECT
  - DOMAIN-SUFFIX,fastly.net,DIRECT
  - DOMAIN-SUFFIX,fastlylb.net,DIRECT

  # ── Tailscale CGNAT 段（防止 TUN 路由死循环）──────────────────────
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve

  # ── 中国大陆直连，其余全部走美国家庭宽带 ─────────────────────────
  - GEOIP,CN,DIRECT
  - MATCH,漏网之鱼
